<!--
  Editorial theme skeleton.
  Replace {{TOKENS}}: TITLE, LANG, ACCENT_NAME, SUBTITLE, META_ROW, TOC_ITEMS, CONTENT, MERMAID_LOADER
-->
<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
    :root {
      --bg: #FBFAF7; --bg-elevated: #FFFFFF; --bg-code: #F4F2EC;
      --ink: #1A1A1A; --ink-muted: #5A5A5A; --ink-faint: #8A8A8A;
      --rule: #E5E2DA; --rule-strong: #C8C4B8;

      /* Accent — swap per doc: terracotta default */
      --accent: #B85C38; --accent-soft: #F4E8E0;
      /* Alternatives:
         ink-blue:  #1F3A5F / #E2E8EE
         forest:    #2C5F3F / #E0E9E3
         burgundy:  #7A1F2B / #EFE0E2
         bronze:    #8B6B3A / #EFE8D9 */

      --status-done: #5A7A5A; --status-active: var(--accent);
      --status-blocked: #A8463A; --status-pending: #8A8A8A; --status-at-risk: #8A6B3A;

      --font-serif: 'Charter', 'Source Serif Pro', 'Source Serif 4', 'Iowan Old Style', 'Apple Garamond', 'Baskerville', 'Times New Roman', 'Source Han Serif SC', 'Noto Serif CJK SC', serif;
      --font-sans: 'Söhne', 'IBM Plex Sans', -apple-system, 'Helvetica Neue', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Menlo', monospace;

      --fs-h1: 2.25rem; --fs-h2: 1.5rem; --fs-h3: 1.175rem; --fs-h4: 1rem;
      --fs-body: 1.0625rem; --fs-small: 0.875rem; --fs-tiny: 0.75rem;
      --lh-tight: 1.2; --lh-body: 1.65;

      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
      --space-6: 1.5rem; --space-8: 2rem; --space-12: 3rem; --space-16: 4rem;

      --content-max: 720px; --content-max-wide: 960px;
      --nav-width: 220px; --gutter: var(--space-12);
    }
    html[lang^="zh"], html[lang^="ja"], html[lang^="ko"] { --lh-body: 1.85; }

    * { box-sizing: border-box; }
    html { background: var(--bg); }
    body { margin: 0; font-family: var(--font-serif); font-size: var(--fs-body);
           line-height: var(--lh-body); color: var(--ink); background: var(--bg);
           -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    p { margin: 0 0 var(--space-4) 0; }
    a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent-soft); }
    a:hover { border-bottom-color: var(--accent); }
    hr { border: none; border-top: 1px solid var(--rule); margin: var(--space-12) 0; }
    code { font-family: var(--font-mono); font-size: 0.9em; background: var(--bg-code);
           padding: 0.1em 0.35em; border-radius: 2px; }
    pre { font-family: var(--font-mono); font-size: 0.9em; background: var(--bg-code);
          padding: var(--space-4) var(--space-6); overflow-x: auto; line-height: 1.5;
          margin: var(--space-6) 0; border-left: 2px solid var(--rule-strong); }
    pre code { background: none; padding: 0; }
    blockquote { font-style: italic; color: var(--ink-muted); padding-left: var(--space-6);
                 border-left: 2px solid var(--rule); margin: var(--space-6) 0; }

    h1, h2, h3, h4 { font-family: var(--font-serif); font-weight: 600;
                     line-height: var(--lh-tight); color: var(--ink); }
    h1 { font-size: var(--fs-h1); font-family: var(--font-sans); font-weight: 700;
         letter-spacing: -0.02em; margin: 0 0 var(--space-3) 0; }
    h2 { font-size: var(--fs-h2); margin: var(--space-12) 0 var(--space-4); }
    h3 { font-size: var(--fs-h3); margin: var(--space-8) 0 var(--space-3); }
    h4 { font-size: var(--fs-h4); margin: var(--space-6) 0 var(--space-2);
         text-transform: uppercase; letter-spacing: 0.06em; font-family: var(--font-sans);
         color: var(--ink-muted); font-weight: 600; }
    .accent-bar { display: inline-block; width: 3px; height: 0.85em;
                  background: var(--accent); margin-right: var(--space-3);
                  vertical-align: -0.05em; }

    .page { display: grid;
            grid-template-columns: var(--nav-width) var(--gutter) minmax(0, var(--content-max)) 1fr;
            min-height: 100vh; max-width: 1400px; margin: 0 auto;
            padding: var(--space-8) var(--space-6); }
    nav.toc { grid-column: 1; position: sticky; top: var(--space-8); align-self: start;
              font-family: var(--font-sans); font-size: var(--fs-small);
              max-height: calc(100vh - 4rem); overflow-y: auto; }
    nav.toc h2 { font-size: var(--fs-tiny); text-transform: uppercase; letter-spacing: 0.08em;
                 color: var(--ink-faint); margin: 0 0 var(--space-3); font-weight: 600;
                 font-family: var(--font-sans); }
    nav.toc ul { list-style: none; padding: 0; margin: 0; }
    nav.toc li { margin-bottom: var(--space-2); }
    nav.toc a { color: var(--ink-muted); border: none; display: block;
                padding: var(--space-1) 0 var(--space-1) var(--space-3);
                border-left: 2px solid transparent; margin-left: -2px; }
    nav.toc a:hover { color: var(--ink); border-left-color: var(--rule-strong); }
    nav.toc a.active { color: var(--accent); border-left-color: var(--accent); }

    main { grid-column: 3; max-width: var(--content-max); }
    main > * { max-width: var(--content-max); }
    main .wide { max-width: var(--content-max-wide); }

    .doc-header { padding-bottom: var(--space-8); margin-bottom: var(--space-12);
                  border-bottom: 1px solid var(--rule-strong); }
    .doc-subtitle { font-size: 1.25rem; font-style: italic; color: var(--ink-muted);
                    margin: 0 0 var(--space-6); max-width: 36em; font-family: var(--font-serif); }
    .meta-row { display: flex; flex-wrap: wrap; gap: var(--space-6);
                font-family: var(--font-sans); font-size: var(--fs-small); color: var(--ink);
                margin-top: var(--space-4); }
    .meta-k { color: var(--ink-faint); text-transform: uppercase; font-size: var(--fs-tiny);
              letter-spacing: 0.06em; margin-right: var(--space-2); }

    .callout { padding: var(--space-4) var(--space-6); margin: var(--space-6) 0;
               border-left: 3px solid var(--rule-strong); background: var(--bg-elevated); }
    .callout-warn { border-left-color: var(--accent); }
    .callout-label { font-family: var(--font-sans); font-size: var(--fs-tiny);
                     text-transform: uppercase; letter-spacing: 0.08em;
                     color: var(--ink-muted); margin-bottom: var(--space-2); }
    .callout > p:last-child { margin-bottom: 0; }

    .metrics-row { display: flex; flex-wrap: wrap; gap: var(--space-4); margin: var(--space-6) 0; }
    .metric { display: inline-block; padding: var(--space-4) var(--space-6);
              background: var(--accent-soft); border-left: 3px solid var(--accent); }
    .metric-value { font-family: var(--font-sans); font-size: 2rem; font-weight: 600;
                    font-variant-numeric: tabular-nums; line-height: 1; color: var(--ink); }
    .metric-label { font-family: var(--font-sans); font-size: var(--fs-small);
                    color: var(--ink-muted); margin-top: var(--space-2); }

    table { width: 100%; border-collapse: collapse; margin: var(--space-6) 0;
            font-size: var(--fs-small); }
    th, td { padding: var(--space-3) var(--space-4); text-align: left;
             border-bottom: 1px solid var(--rule); vertical-align: top; }
    th { font-family: var(--font-sans); font-weight: 600; font-size: var(--fs-tiny);
         text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-muted);
         border-bottom: 1px solid var(--rule-strong); }
    table.two-col th { width: 50%; }

    .status { font-family: var(--font-sans); font-size: var(--fs-small); font-weight: 500;
              text-transform: uppercase; letter-spacing: 0.04em;
              font-variant-numeric: tabular-nums; white-space: nowrap; }
    .status-done { color: var(--status-done); } .status-done::before { content: "● "; }
    .status-active { color: var(--status-active); font-weight: 600; } .status-active::before { content: "▸ "; }
    .status-blocked { color: var(--status-blocked); font-weight: 600; } .status-blocked::before { content: "■ "; }
    .status-pending { color: var(--status-pending); } .status-pending::before { content: "○ "; }
    .status-at-risk { color: var(--status-at-risk); font-weight: 600; } .status-at-risk::before { content: "▲ "; }

    .date { font-family: var(--font-mono); font-size: var(--fs-small);
            color: var(--accent); font-variant-numeric: tabular-nums; }

    .diagram-figure { margin: var(--space-8) 0; padding: var(--space-6);
                      background: var(--bg-elevated); border: 1px solid var(--rule);
                      max-width: var(--content-max-wide); }
    .diagram-figure .mermaid { display: flex; justify-content: center; }
    figcaption { font-family: var(--font-sans); font-size: var(--fs-small);
                 color: var(--ink-muted); text-align: center; margin-top: var(--space-4); }

    ul, ol { padding-left: var(--space-6); margin: var(--space-4) 0; }
    li { margin-bottom: var(--space-2); }

    .toc-mobile { display: none; }

    @media (max-width: 768px) {
      :root { --fs-h1: 1.75rem; --fs-h2: 1.25rem; --fs-body: 1rem; }
      .page { display: block; padding: var(--space-6) var(--space-4); }
      nav.toc { display: none; }
      main { max-width: 100%; }
      main > * { max-width: 100%; }
      .toc-mobile { display: block; font-family: var(--font-sans); font-size: var(--fs-small);
                    margin-bottom: var(--space-8); border: 1px solid var(--rule);
                    padding: var(--space-3) var(--space-4); }
      .toc-mobile summary { cursor: pointer; color: var(--ink-muted);
                            text-transform: uppercase; letter-spacing: 0.06em;
                            font-size: var(--fs-tiny); }
      .toc-mobile ul { list-style: none; padding: 0; margin: var(--space-3) 0 0 0; }
      .toc-mobile a { color: var(--ink); border: none; display: block;
                      padding: var(--space-2) 0; }
      .metrics-row { flex-direction: column; }
      .metric { width: 100%; box-sizing: border-box; }
      .meta-row { gap: var(--space-3); flex-direction: column; }
    }

    @media print {
      body { font-size: 11pt; line-height: 1.5; background: #FFFFFF !important; }
      .page { display: block; padding: 0; }
      nav.toc, .toc-mobile { display: none; }
      main { max-width: 100%; }
      h2, h3 { page-break-after: avoid; }
      table, .callout, .metric, .diagram-figure { page-break-inside: avoid; }
      a { color: var(--ink); border-bottom: none; text-decoration: underline; }
      a[href^="http"]::after { content: " (" attr(href) ")"; font-size: 9pt; color: var(--ink-muted); }
      pre { white-space: pre-wrap; word-wrap: break-word; }
    }
  </style>
</head>
<body>
  <div class="page">
    <nav class="toc">
      <h2>Contents</h2>
      <ul>{{TOC_ITEMS}}</ul>
    </nav>
    <main>
      <details class="toc-mobile">
        <summary>Contents</summary>
        <ul>{{TOC_ITEMS}}</ul>
      </details>

      <header class="doc-header">
        <h1>{{TITLE}}</h1>
        {{SUBTITLE_BLOCK}}
        {{META_ROW}}
      </header>

      {{CONTENT}}
    </main>
  </div>

  {{MERMAID_LOADER}}
  <script>
    (function() {
      const links = document.querySelectorAll('nav.toc a');
      if (!links.length) return;
      const sections = Array.from(links).map(a => document.querySelector(a.getAttribute('href'))).filter(Boolean);
      function onScroll() {
        const y = window.scrollY + 100;
        let current = sections[0];
        for (const s of sections) { if (s.offsetTop <= y) current = s; }
        links.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + (current?.id || '')));
      }
      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();
    })();
    window.addEventListener('beforeprint', () => {
      document.querySelectorAll('details').forEach(d => { d.dataset.wasOpen = d.open; d.open = true; });
    });
    window.addEventListener('afterprint', () => {
      document.querySelectorAll('details').forEach(d => { d.open = d.dataset.wasOpen === 'true'; });
    });
  </script>
</body>
</html>
