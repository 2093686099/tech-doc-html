<!--
  Dashboard theme skeleton — for execution plans, roadmaps, ops/tracking docs.
-->
<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
    :root {
      --bg: #FAFAF9; --bg-elevated: #FFFFFF; --bg-subtle: #F4F4F2; --bg-code: #F0EFEC;
      --ink: #18181B; --ink-muted: #52525B; --ink-faint: #8B8B92;
      --rule: #E4E4E2; --rule-strong: #C8C8C5;

      /* Accent — forest default for exec plans, terracotta for roadmaps */
      --accent: #2C5F3F; --accent-soft: #E0E9E3;

      --status-done: #5A7A5A; --status-active: var(--accent);
      --status-blocked: #A8463A; --status-pending: #8B8B92; --status-at-risk: #8A6B3A;

      --font-sans: 'Söhne', 'IBM Plex Sans', -apple-system, 'Helvetica Neue', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Menlo', monospace;

      --fs-h1: 1.875rem; --fs-h2: 1.375rem; --fs-h3: 1.0625rem; --fs-h4: 0.875rem;
      --fs-body: 0.9375rem; --fs-small: 0.8125rem; --fs-tiny: 0.75rem;
      --lh-tight: 1.25; --lh-body: 1.55;

      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
      --space-6: 1.5rem; --space-8: 2rem; --space-12: 3rem; --space-16: 4rem;

      --content-max: 880px; --content-max-wide: 1120px;
      --nav-width: 200px; --gutter: var(--space-8);
    }

    * { box-sizing: border-box; }
    html { background: var(--bg); }
    body { margin: 0; font-family: var(--font-sans); font-size: var(--fs-body);
           line-height: var(--lh-body); color: var(--ink); background: var(--bg);
           -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    p { margin: 0 0 var(--space-4) 0; }
    a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent-soft); }
    a:hover { border-bottom-color: var(--accent); }
    hr { border: none; border-top: 1px solid var(--rule); margin: var(--space-8) 0; }
    code { font-family: var(--font-mono); font-size: 0.9em; background: var(--bg-code);
           padding: 0.1em 0.35em; border-radius: 2px; }
    pre { font-family: var(--font-mono); font-size: 0.9em; background: var(--bg-code);
          padding: var(--space-4) var(--space-6); overflow-x: auto; line-height: 1.5;
          margin: var(--space-4) 0; border-left: 2px solid var(--rule-strong); }
    pre code { background: none; padding: 0; }

    h1, h2, h3, h4 { font-family: var(--font-sans); line-height: var(--lh-tight); color: var(--ink); }
    h1 { font-size: var(--fs-h1); font-weight: 700; letter-spacing: -0.02em;
         margin: 0 0 var(--space-2); }
    h2 { font-size: var(--fs-h2); font-weight: 600; margin: var(--space-12) 0 var(--space-4); }
    h3 { font-size: var(--fs-h3); font-weight: 600; margin: var(--space-6) 0 var(--space-3); }
    h4 { font-size: var(--fs-h4); font-weight: 600; margin: var(--space-4) 0 var(--space-2);
         text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-muted); }
    .accent-bar { display: inline-block; width: 3px; height: 0.85em; background: var(--accent);
                  margin-right: var(--space-3); vertical-align: -0.05em; }

    .page { display: grid;
            grid-template-columns: var(--nav-width) var(--gutter) minmax(0, var(--content-max)) 1fr;
            min-height: 100vh; max-width: 1400px; margin: 0 auto;
            padding: var(--space-8) var(--space-6); }
    nav.toc { grid-column: 1; position: sticky; top: var(--space-8); align-self: start;
              font-size: var(--fs-small); max-height: calc(100vh - 4rem); overflow-y: auto; }
    nav.toc h2 { font-size: var(--fs-tiny); text-transform: uppercase; letter-spacing: 0.08em;
                 color: var(--ink-faint); margin: 0 0 var(--space-3); font-weight: 600; }
    nav.toc ul { list-style: none; padding: 0; margin: 0; }
    nav.toc li { margin-bottom: var(--space-2); }
    nav.toc a { color: var(--ink-muted); border: none; display: block;
                padding: var(--space-1) 0 var(--space-1) var(--space-3);
                border-left: 2px solid transparent; margin-left: -2px; }
    nav.toc a:hover { color: var(--ink); border-left-color: var(--rule-strong); }
    nav.toc a.active { color: var(--accent); border-left-color: var(--accent); }

    main { grid-column: 3; max-width: var(--content-max); }
    main > * { max-width: var(--content-max); }
    main .wide { max-width: var(--content-max-wide); }

    .doc-header { padding-bottom: var(--space-6); margin-bottom: var(--space-6);
                  border-bottom: 1px solid var(--rule-strong); }
    .doc-subtitle { font-size: 1.0625rem; color: var(--ink-muted); margin: 0 0 var(--space-4);
                    max-width: 48em; font-weight: 500; }
    .meta-row { display: flex; flex-wrap: wrap; gap: var(--space-6); font-size: var(--fs-small);
                color: var(--ink); margin-top: var(--space-3); }
    .meta-k { color: var(--ink-faint); text-transform: uppercase; font-size: var(--fs-tiny);
              letter-spacing: 0.06em; margin-right: var(--space-2); }

    /* Status glance — the dashboard signature pattern */
    .status-glance { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: var(--space-6);
                     margin: var(--space-6) 0 var(--space-12); padding: var(--space-6);
                     background: var(--bg-elevated); border: 1px solid var(--rule);
                     max-width: var(--content-max-wide); }
    .status-glance h3 { font-size: var(--fs-tiny); text-transform: uppercase;
                        letter-spacing: 0.08em; color: var(--ink-muted);
                        margin: 0 0 var(--space-3); font-weight: 600; }
    .progress-label { font-size: var(--fs-small); color: var(--ink-muted);
                      margin-bottom: var(--space-2); text-transform: uppercase;
                      letter-spacing: 0.06em; }
    .progress-bar { height: 6px; background: var(--bg-subtle); margin-bottom: var(--space-4);
                    position: relative; }
    .progress-fill { height: 100%; background: var(--accent); }
    .progress-stats { display: flex; gap: var(--space-6); flex-wrap: wrap; }
    .stat { display: flex; flex-direction: column; }
    .stat-num { font-size: 1.5rem; font-weight: 700; font-variant-numeric: tabular-nums;
                line-height: 1; color: var(--ink); }
    .stat-lab { font-size: var(--fs-tiny); color: var(--ink-muted); text-transform: uppercase;
                letter-spacing: 0.04em; margin-top: 0.25rem; }
    .next-list, .blocked-list { list-style: none; padding: 0; margin: 0; font-size: var(--fs-small); }
    .next-list li, .blocked-list li { margin-bottom: var(--space-2); line-height: 1.4; }
    .meta-faint { color: var(--ink-faint); font-size: var(--fs-tiny); }
    @media (max-width: 900px) { .status-glance { grid-template-columns: 1fr; } }

    /* Phase strip */
    .phase-strip { display: flex; gap: 0; list-style: none; padding: 0;
                   margin: var(--space-6) 0; border-top: 1px solid var(--rule);
                   border-bottom: 1px solid var(--rule); background: var(--bg-elevated);
                   max-width: var(--content-max-wide); }
    .phase { flex: 1; padding: var(--space-3) var(--space-4);
             border-right: 1px solid var(--rule); }
    .phase:last-child { border-right: none; }
    .phase-label { font-size: var(--fs-tiny); text-transform: uppercase;
                   letter-spacing: 0.08em; color: var(--ink-faint); }
    .phase-name { font-size: var(--fs-body); font-weight: 600; margin-top: var(--space-1); }
    .phase-dates { font-size: var(--fs-small); color: var(--ink-muted);
                   margin-top: var(--space-1); font-variant-numeric: tabular-nums; }
    .phase-active { background: var(--accent-soft); border-left: 3px solid var(--accent);
                    margin-left: -1px; }
    .phase-active .phase-name { color: var(--ink); }
    .phase-done .phase-name { color: var(--ink-muted); }
    .phase-done .phase-label::after { content: " ✓"; color: var(--status-done); }

    /* Status pills (text-only, geometric prefix) */
    .status { font-size: var(--fs-small); font-weight: 500; text-transform: uppercase;
              letter-spacing: 0.04em; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .status-done { color: var(--status-done); } .status-done::before { content: "● "; }
    .status-active { color: var(--status-active); font-weight: 600; } .status-active::before { content: "▸ "; }
    .status-blocked { color: var(--status-blocked); font-weight: 600; } .status-blocked::before { content: "■ "; }
    .status-pending { color: var(--status-pending); } .status-pending::before { content: "○ "; }
    .status-at-risk { color: var(--status-at-risk); font-weight: 600; } .status-at-risk::before { content: "▲ "; }

    /* Date */
    .date { font-family: var(--font-mono); font-size: var(--fs-small);
            color: var(--accent); font-variant-numeric: tabular-nums; }
    .mono { font-family: var(--font-mono); color: var(--ink-muted); }

    /* Task table */
    table { width: 100%; border-collapse: collapse; margin: var(--space-6) 0;
            font-size: var(--fs-small); }
    th, td { padding: var(--space-3) var(--space-4); text-align: left;
             border-bottom: 1px solid var(--rule); vertical-align: top; }
    th { font-weight: 600; font-size: var(--fs-tiny); text-transform: uppercase;
         letter-spacing: 0.06em; color: var(--ink-muted);
         border-bottom: 1px solid var(--rule-strong); }
    .task-table .col-id { width: 3.5rem; }
    .task-table .col-owner, .task-table .col-status, .task-table .col-target {
      width: 7rem; white-space: nowrap; }
    .task-table .col-deps { width: 10rem; color: var(--ink-muted); }
    .task-table tbody tr:hover { background: var(--bg-subtle); }

    /* Filter bar */
    .filter-bar { display: flex; gap: var(--space-2); align-items: center; flex-wrap: wrap;
                  margin: var(--space-4) 0; font-size: var(--fs-small); }
    .filter-label { color: var(--ink-muted); font-size: var(--fs-tiny);
                    text-transform: uppercase; letter-spacing: 0.06em;
                    margin-right: var(--space-2); }
    .filter-btn { background: none; border: 1px solid var(--rule);
                  padding: var(--space-1) var(--space-3); color: var(--ink-muted);
                  cursor: pointer; font: inherit; font-family: var(--font-sans); }
    .filter-btn:hover { color: var(--ink); border-color: var(--rule-strong); }
    .filter-btn.active { color: var(--ink); border-color: var(--ink); background: var(--bg-elevated); }
    .filter-btn .count { color: var(--ink-faint); margin-left: var(--space-1);
                          font-variant-numeric: tabular-nums; font-size: var(--fs-tiny); }
    .filter-btn.active .count { color: var(--ink-muted); }

    /* Callouts */
    .callout { padding: var(--space-4) var(--space-6); margin: var(--space-6) 0;
               border-left: 3px solid var(--rule-strong); background: var(--bg-elevated); }
    .callout-warn { border-left-color: var(--accent); }
    .callout-label { font-size: var(--fs-tiny); text-transform: uppercase; letter-spacing: 0.08em;
                     color: var(--ink-muted); margin-bottom: var(--space-2); font-weight: 600; }
    .callout > p:last-child { margin-bottom: 0; }

    /* Milestone list */
    .milestones-list { list-style: none; padding: 0; margin: 0; font-size: var(--fs-small); }
    .milestones-list li { margin-bottom: var(--space-2); }

    /* Mermaid */
    .diagram-figure { margin: var(--space-6) 0; padding: var(--space-4);
                      background: var(--bg-elevated); border: 1px solid var(--rule);
                      max-width: var(--content-max-wide); }
    .diagram-figure .mermaid { display: flex; justify-content: center; }
    figcaption { font-size: var(--fs-small); color: var(--ink-muted); text-align: center;
                 margin-top: var(--space-3); }

    /* Collapsibles */
    details.collapse-item { border-bottom: 1px solid var(--rule); padding: var(--space-3) 0; }
    details.collapse-item summary { cursor: pointer; list-style: none;
                                     display: flex; justify-content: space-between;
                                     align-items: baseline; }
    details.collapse-item summary::-webkit-details-marker { display: none; }
    details.collapse-item summary::before { content: "+ "; color: var(--accent);
                                            font-family: var(--font-mono);
                                            margin-right: var(--space-2); }
    details.collapse-item[open] summary::before { content: "− "; }
    .collapse-meta { font-size: var(--fs-tiny); color: var(--ink-faint);
                     text-transform: uppercase; letter-spacing: 0.06em; }
    .collapse-body { padding: var(--space-3) 0 var(--space-2) var(--space-6); }

    ul, ol { padding-left: var(--space-6); margin: var(--space-4) 0; }
    li { margin-bottom: var(--space-2); }

    .toc-mobile { display: none; }

    @media (max-width: 768px) {
      :root { --fs-h1: 1.5rem; --fs-h2: 1.125rem; --fs-body: 0.9375rem; }
      .page { display: block; padding: var(--space-4); }
      nav.toc { display: none; }
      main, main > * { max-width: 100%; }
      .toc-mobile { display: block; font-size: var(--fs-small); margin-bottom: var(--space-6);
                    border: 1px solid var(--rule); padding: var(--space-3) var(--space-4); }
      .toc-mobile summary { cursor: pointer; color: var(--ink-muted);
                            text-transform: uppercase; letter-spacing: 0.06em;
                            font-size: var(--fs-tiny); }
      .toc-mobile ul { list-style: none; padding: 0; margin: var(--space-3) 0 0; }
      .toc-mobile a { color: var(--ink); border: none; display: block; padding: var(--space-2) 0; }
      .progress-stats { gap: var(--space-4); }
      .phase-strip { flex-direction: column; }
      .phase { border-right: none; border-bottom: 1px solid var(--rule); }
      .phase-active { border-left: 3px solid var(--accent); }
      table { font-size: var(--fs-tiny); }
      .task-table .col-deps { display: none; }
    }

    @media print {
      body { font-size: 10pt; line-height: 1.45; background: #FFFFFF !important; }
      .page { display: block; padding: 0; }
      nav.toc, .toc-mobile, .filter-bar { display: none; }
      main, main > * { max-width: 100%; }
      h2, h3 { page-break-after: avoid; }
      table, .callout, .status-glance, .phase-strip, .diagram-figure { page-break-inside: avoid; }
      a { color: var(--ink); border-bottom: none; text-decoration: underline; }
      a[href^="http"]::after { content: " (" attr(href) ")"; font-size: 9pt; color: var(--ink-muted); }
      pre { white-space: pre-wrap; word-wrap: break-word; }
    }
  </style>
</head>
<body>
  <div class="page">
    <nav class="toc">
      <h2>Contents</h2>
      <ul>{{TOC_ITEMS}}</ul>
    </nav>
    <main>
      <details class="toc-mobile">
        <summary>Contents</summary>
        <ul>{{TOC_ITEMS}}</ul>
      </details>

      <header class="doc-header">
        <h1>{{TITLE}}</h1>
        {{SUBTITLE_BLOCK}}
        {{META_ROW}}
      </header>

      {{STATUS_GLANCE}}

      {{CONTENT}}
    </main>
  </div>

  {{MERMAID_LOADER}}
  <script>
    /* Scroll-spy */
    (function() {
      const links = document.querySelectorAll('nav.toc a');
      if (!links.length) return;
      const sections = Array.from(links).map(a => document.querySelector(a.getAttribute('href'))).filter(Boolean);
      function onScroll() {
        const y = window.scrollY + 100;
        let current = sections[0];
        for (const s of sections) { if (s.offsetTop <= y) current = s; }
        links.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + (current?.id || '')));
      }
      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();
    })();
    /* Filter buttons */
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const filter = btn.dataset.filter;
        const bar = btn.closest('.filter-bar');
        const table = bar.nextElementSibling;
        bar.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
        table.querySelectorAll('tbody tr').forEach(row => {
          row.style.display = (filter === 'all' || row.dataset.status === filter) ? '' : 'none';
        });
      });
    });
    /* Print: expand collapsibles */
    window.addEventListener('beforeprint', () => {
      document.querySelectorAll('details').forEach(d => { d.dataset.wasOpen = d.open; d.open = true; });
    });
    window.addEventListener('afterprint', () => {
      document.querySelectorAll('details').forEach(d => { d.open = d.dataset.wasOpen === 'true'; });
    });
  </script>
</body>
</html>
